function render() {
  const app = document.getElementById("app");
  clearDialogueTimer();

  if (SOURCE_CACHE.error && !isScreenDataReady()) {
    app.innerHTML = renderLoadError();
    STATE.sceneJustEntered = false;
    return;
  }

  if (!isScreenDataReady()) {
    app.innerHTML = renderLoading();
    STATE.sceneJustEntered = false;
    return;
  }

  if (STATE.screen === "breakfast") {
    if (!patchBreakfastScreen()) {
      mountBreakfastScreen(app);
    }
  } else if (STATE.screen === "dialogue") {
    if (!patchDialogueScreen()) {
      mountDialogueScreen(app);
    }
  } else {
    if (STATE.screen === "title") app.innerHTML = renderTitle();
    if (STATE.screen === "world") app.innerHTML = renderWorld();
    if (STATE.screen === "selection") app.innerHTML = renderSelection();
    if (STATE.screen === "diary") app.innerHTML = renderDiary();
    if (STATE.screen === "end") app.innerHTML = renderEnd();
  }

  if (STATE.screen === "dialogue") syncDialogueTimer();
  syncAudioForState();
  STATE.sceneJustEntered = false;
}

function startDialogue(npcId) {
  ensureDayProgress();
  STATE.selectedNpcId = npcId;
  STATE.blockIndex = 0;
  STATE.lastChoiceTone = "A";
  STATE.debugLastBlockTag = null;
  resetDialogueBlock();
  setScreen("dialogue");
  const npc = getNpc(npcId);
  debugLog(`Start dialogue from ${npc.dialogueFile}`);
}

function advanceBreakfast() {
  const breakfast = currentBreakfast();
  if (STATE.breakfastIndex < breakfast.lines.length) {
    STATE.breakfastIndex += 1;
  }
  render();
}

function continueDialogue() {
  const block = currentBlock();
  if (!block) return;
  if (!Array.isArray(block.steps) || block.steps.length === 0) {
    STATE.dialoguePhase = "response";
    render();
    return;
  }
  if (STATE.dialoguePhase !== "sequence") return;
  if (STATE.dialogueStepIndex < block.steps.length - 1) {
    STATE.dialogueStepIndex += 1;
  } else {
    STATE.dialoguePhase = "response";
  }
  render();
}

// Round 10 redesign: "跳过寒暄" is now a "fast-forward to next interaction" button,
// visible across the whole conversation (every sequence step), not only in Block 1
// small-talk. Behaviour by current position:
//   1. If the player is BEFORE dialogue.coreInteractionEntry → jump TO that entry.
//      (Skips opening pleasantries, observations, monologue lead-in.)
//   2. If the player is AT or PAST coreInteractionEntry but still in sequence →
//      fast-forward to the LAST step of the current block, then switch to response
//      phase. (Skips any remaining transition / observation beats so the next
//      decision point is reached immediately.)
//   3. The button is hidden during response / reaction phases (those ARE the
//      important moments — player choice and NPC reaction — and must not be
//      skipped per user spec).
// Diary / end / observation modes are separate screens, so this handler is never
// reachable from them.
function skipSmalltalk() {
  const dialogue = currentDialogue();
  const block = currentBlock();
  if (!dialogue || !block || !Array.isArray(block.steps) || block.steps.length === 0) return;
  if (STATE.dialoguePhase !== "sequence") return;

  const coreEntry = dialogue.coreInteractionEntry || { blockIndex: 0, stepIndex: 0 };
  const here = STATE.blockIndex * 1000 + STATE.dialogueStepIndex;
  const entry = coreEntry.blockIndex * 1000 + coreEntry.stepIndex;

  // Case 1: jump forward to the configured core-interaction entry.
  if (here < entry) {
    STATE.blockIndex = coreEntry.blockIndex;
    STATE.dialogueStepIndex = Math.min(
      coreEntry.stepIndex,
      Math.max(0, currentBlock().steps.length - 1)
    );
    render();
    return;
  }

  // Case 2: fast-forward to the next decision point (response phase of current block).
  const lastIndex = block.steps.length - 1;
  if (STATE.dialogueStepIndex < lastIndex) {
    STATE.dialogueStepIndex = lastIndex;
  }
  STATE.dialoguePhase = "response";
  render();
}

function chooseResponse(index) {
  const block = currentBlock();
  if (!block) return;
  if (!Number.isInteger(index) || index < 0 || index >= block.responses.length) {
    debugLog("Invalid response index", { index, blockIndex: STATE.blockIndex, npcId: STATE.selectedNpcId });
    return;
  }
  STATE.selectedResponseIndex = index;
  STATE.lastChoiceTone = block.responses[index].tone;
  STATE.dialoguePhase = "reaction";
  render();
}

function nextBlock() {
  const dialogue = currentDialogue();
  if (!dialogue) return;
  if (STATE.dialoguePhase !== "reaction") return;
  if (STATE.blockIndex < dialogue.blocks.length - 1) {
    STATE.blockIndex += 1;
    resetDialogueBlock();
    render();
    return;
  }
  setScreen("diary");
  render();
}

function resetRun() {
  clearDialogueTimer();
  STATE.breakfastIndex = 0;
  STATE.breakfastDay = 1;
  STATE.selectedNpcId = null;
  STATE.replayMode = false;
  STATE.dayProgress = {};
  STATE.blockIndex = 0;
  STATE.lastChoiceTone = "A";
  STATE.debugLastBlockTag = null;
  resetDialogueBlock();
  pauseAudioTrack();
  AUDIO_STATE.manuallyPaused = false;
  setScreen("title");
}

// Advance to the next day: reset per-run dialogue state but keep breakfastDay incremented
// (capped at BREAKFAST_DAY_LIMIT). Land back at breakfast so the full day cycle replays
// for the new day's content.
function advanceToNextDay() {
  if (STATE.breakfastDay >= BREAKFAST_DAY_LIMIT) return;
  clearDialogueTimer();
  STATE.breakfastDay += 1;
  STATE.breakfastIndex = 0;
  STATE.selectedNpcId = null;
  STATE.replayMode = false;
  STATE.blockIndex = 0;
  STATE.lastChoiceTone = "A";
  STATE.debugLastBlockTag = null;
  resetDialogueBlock();
  ensureDayProgress();
  setScreen("breakfast");
}

document.addEventListener("click", (event) => {
  const actionEl = event.target.closest("[data-action]");
  if (!actionEl) return;

  const action = actionEl.dataset.action;
  registerUserInteraction();

  if (action === "retry-load") {
    SOURCE_CACHE.error = null;
    setScreen("title");
    render();
    return;
  }

  if (action === "begin-day") {
    setScreen("breakfast");
    ensureDataForScreen("breakfast").then(render).catch(() => render());
    render();
    return;
  }

  if (action === "go-title") {
    setScreen("title");
    render();
    return;
  }

  if (action === "toggle-audio") {
    toggleAudioTrack();
    return;
  }

  if (action === "next-breakfast") {
    advanceBreakfast();
    return;
  }

  if (action === "go-world") {
    setScreen("world");
    render();
    return;
  }

  if (action === "go-selection") {
    STATE.replayMode = false;
    setScreen("selection");
    render();
    return;
  }

  if (action === "select-npc") {
    startDialogue(actionEl.dataset.npcId);
    ensureDataForScreen("dialogue").then(render).catch(() => render());
    render();
    return;
  }

  if (action === "continue-dialogue") {
    continueDialogue();
    return;
  }

  if (action === "skip-smalltalk") {
    skipSmalltalk();
    return;
  }

  if (action === "choose-response") {
    chooseResponse(Number(actionEl.dataset.responseIndex));
    return;
  }

  if (action === "next-block") {
    nextBlock();
    if (STATE.screen === "diary") {
      ensureDataForScreen("diary").then(render).catch(() => render());
    }
    return;
  }

  if (action === "back-selection") {
    setScreen("selection");
    render();
    return;
  }

  if (action === "back-end") {
    STATE.replayMode = false;
    setScreen("end");
    render();
    return;
  }

  if (action === "finish-day") {
    const dayState = currentDayProgress();
    markNpcExperienced(STATE.selectedNpcId);
    if (!STATE.replayMode && !dayState.dayCompleted) {
      dayState.todayMainChoice = STATE.selectedNpcId;
      dayState.dayCompleted = true;
    }
    STATE.replayMode = false;
    setScreen("end");
    render();
    return;
  }

  if (action === "replay-day") {
    STATE.replayMode = true;
    setScreen("selection");
    render();
    return;
  }

  if (action === "next-day") {
    advanceToNextDay();
    render();
    return;
  }

  if (action === "restart") {
    resetRun();
    render();
  }
});

applyPerformanceMode();
if (typeof window.addEventListener === "function") {
  window.addEventListener("resize", applyPerformanceMode, { passive: true });
}
render();
</script>
</body>
</html>
