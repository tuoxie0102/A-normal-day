<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像男人一样相亲</title>
<link rel="icon" href="data:,">
<style>
  :root {
    /* ===== Round 6 · UI Overhaul · Design Tokens ===== */

    /* Background layers — for room/page-level surfaces */
    --bg-deep:    #0c0a08;
    --bg:         #14110f;
    --bg-soft:    #1b1714;

    /* Surface layers — for cards / panels / trays */
    --surface:           rgba(22, 18, 15, 0.84);
    --surface-strong:    rgba(19, 16, 13, 0.92);
    --surface-raised:    rgba(34, 28, 24, 0.88);
    --surface-inset:     rgba(13, 11, 9, 0.72);
    --surface-paper:     #f5eadb;
    --surface-paper-warm:#f7eddc;

    /* Foreground — text scale */
    --text:        #f3ebdf;
    --text-strong: #fff4dd;
    --text-paper:  #2a211a;
    --muted:       #cfbea8;
    --muted-soft:  #9d8c75;

    /* Accent — warm gold, the brand's single hero hue */
    --accent:        #d7b076;
    --accent-strong: #e6c189;
    --accent-deep:   #b88a52;
    --accent-soft:   rgba(215, 176, 118, 0.32);
    --accent-glow:   rgba(230, 193, 137, 0.5);
    --accent-glow-soft: rgba(215, 176, 118, 0.16);

    /* Lines & dividers */
    --line:        rgba(255, 255, 255, 0.08);
    --line-strong: rgba(255, 255, 255, 0.14);
    --line-warm:   rgba(215, 176, 118, 0.22);
    --line-paper:  rgba(133, 96, 60, 0.14);

    /* ===== Spatial rhythm (8px grid) ===== */
    --space-xxs: 4px;
    --space-xs:  8px;
    --space-sm:  12px;
    --space-md:  16px;
    --space-lg:  24px;
    --space-xl:  32px;
    --space-2xl: 48px;
    --space-3xl: 64px;

    /* ===== Radius scale ===== */
    --radius-xs: 6px;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;
    --radius-xl: 24px;
    --radius-2xl: 30px;
    --radius-pill: 999px;

    /* ===== Shadow scale (layered) ===== */
    --shadow-sm:  0 2px 6px rgba(0, 0, 0, 0.18);
    --shadow-md:  0 8px 22px rgba(0, 0, 0, 0.28);
    --shadow-lg:  0 18px 44px rgba(0, 0, 0, 0.36);
    --shadow-xl:  0 32px 80px rgba(0, 0, 0, 0.48), 0 2px 0 rgba(255, 255, 255, 0.04) inset;
    --shadow-glow:    0 0 0 1px var(--accent-soft), 0 0 24px var(--accent-glow-soft);
    --shadow-inset:   inset 0 1px 0 rgba(255, 255, 255, 0.06);
    --shadow-scene:   inset 0 -160px 140px rgba(0, 0, 0, 0.28);

    /* ===== Typography ===== */
    --ui-sans:  "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    --ui-serif: "Source Han Serif SC", "Songti SC", "Noto Serif SC", "Georgia", serif;
    --ui-hand:  "KaiTi", "STKaiti", "FangSong", serif;

    /* ===== Motion ===== */
    --ease-out:     cubic-bezier(.2, .8, .2, 1);
    --ease-in-out:  cubic-bezier(.4, 0, .2, 1);
    --ease-spring:  cubic-bezier(.34, 1.56, .64, 1);
    --duration-fast:    180ms;
    --duration-base:    260ms;
    --duration-slow:    460ms;

    /* ===== Legacy aliases — keep so existing rules read identically ===== */
    --panel:        var(--surface);
    --panel-strong: var(--surface-strong);
    --panel-soft:   rgba(34, 28, 24, 0.72);
    --paper:        var(--surface-paper);
    --paper-line:   var(--line-paper);
    --shadow:       var(--shadow-xl);
    --scene-shadow: var(--shadow-scene);
  }

  /* ===== Global resets & body ===== */
  *, *::before, *::after { box-sizing: border-box; }

  ::selection {
    background: var(--accent-soft);
    color: var(--text-strong);
  }

  html {
    color-scheme: dark;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at 50% 0%, rgba(215, 176, 118, 0.18), transparent 32%),
      radial-gradient(circle at 50% 100%, rgba(80, 50, 30, 0.12), transparent 38%),
      linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-deep) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: var(--ui-sans);
    font-feature-settings: "tnum", "ss01";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  #app {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .screen {
    width: min(1220px, 100%);
    min-height: min(92vh, 920px);
    border-radius: var(--radius-2xl);
    overflow: hidden;
    position: relative;
    background: var(--panel);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  /* 极细的金色顶光，让卡片有"被光照到"的边缘感 */
  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background:
      linear-gradient(180deg, rgba(255, 224, 178, 0.10) 0%, transparent 12%);
    mix-blend-mode: screen;
    opacity: 0.7;
    z-index: 2;
  }

  .screen.scene-transition {
    animation: sceneFade 460ms cubic-bezier(.2, .8, .2, 1);
  }

  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--bg-image, none);
    background-size: cover;
    background-position: center;
    opacity: 0.34;
    pointer-events: none;
  }

  .screen > * {
    position: relative;
    z-index: 1;
  }

  .full-scene {
    min-height: min(92vh, 920px);
    position: relative;
  }

  .full-scene::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.28));
    pointer-events: none;
  }

  .scene-stage {
    position: relative;
    min-height: 100%;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.22)),
      var(--scene-image, none);
    background-size: cover;
    background-position: center;
    box-shadow: var(--scene-shadow);
    overflow: hidden;
  }

  /* Scene 顶部柔化光、底部暗角 — 让人物更"沉"进场景 */
  .scene-stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 16%, rgba(255, 224, 178, 0.10), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(0, 0, 0, 0.32), transparent 64%);
    pointer-events: none;
    z-index: 1;
  }

  .scene-stage.focused::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(7, 6, 5, 0.20);
    pointer-events: none;
    transition: opacity 320ms ease;
    z-index: 1;
  }

  .topbar,
  .bottombar {
    position: absolute;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 24px;
    z-index: 5;
  }

  .topbar {
    top: 0;
  }

  .bottombar {
    bottom: 0;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .skip-smalltalk-btn {
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 6px 14px;
    opacity: 0.78;
  }

  .skip-smalltalk-btn:hover {
    opacity: 1;
  }

  .skip-smalltalk-btn[hidden] {
    display: none !important;
  }

  .eyebrow {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .meta {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
  }

  .title-block {
    position: absolute;
    left: 36px;
    top: 40px;
    max-width: 580px;
    padding: 26px 28px 28px;
    border-radius: var(--radius-lg);
    background:
      linear-gradient(180deg, rgba(22, 18, 14, 0.78), rgba(14, 12, 10, 0.74));
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line-warm);
    box-shadow:
      0 20px 44px rgba(0, 0, 0, 0.34),
      var(--shadow-inset);
  }

  /* title-block 内部左侧装饰金线 */
  .title-block::before {
    content: "";
    position: absolute;
    left: 14px;
    top: 22px;
    bottom: 22px;
    width: 2px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--accent), rgba(215, 176, 118, 0));
    opacity: 0.5;
  }

  .title-block h1,
  .title-block h2 {
    margin: 12px 0 14px;
    font-family: var(--ui-serif);
    font-weight: 600;
    line-height: 1.18;
    color: #f5e6cd;
    letter-spacing: 0.02em;
  }

  .title-block h1 {
    font-size: clamp(32px, 4.8vw, 50px);
  }

  .title-block h2 {
    font-size: clamp(24px, 3vw, 32px);
  }

  .title-block p {
    margin: 0;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.9;
    letter-spacing: 0.02em;
  }

  /* ---------- 封面页（title screen） ---------- */
  .title-cover {
    position: absolute;
    inset: 0;
    background-image: var(--bg-image, none);
    background-size: cover;
    background-position: center 38%;
    z-index: 0;
  }

  .title-cover::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(15, 13, 11, 0.10) 0%,
      rgba(15, 13, 11, 0.00) 38%,
      rgba(15, 13, 11, 0.42) 78%,
      rgba(15, 13, 11, 0.72) 100%
    );
    pointer-events: none;
  }

  .title-shell {
    position: relative;
    z-index: 2;
    min-height: min(92vh, 920px);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 56px 56px 64px;
  }

  .title-text-block {
    max-width: 540px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: titleFadeUp 800ms var(--ease-out) both;
  }

  .title-text-block .eyebrow {
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.36em;
    font-weight: 600;
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
    animation: titleFadeUp 800ms 80ms var(--ease-out) both;
  }

  /* 主标题加细金条装饰前缀 */
  .title-text-block .eyebrow::before {
    content: "";
    display: inline-block;
    width: 28px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
    vertical-align: middle;
    margin-right: 12px;
    transform: translateY(-2px);
  }

  .title-text-block h1 {
    margin: 6px 0 0;
    font-family: var(--ui-serif);
    font-weight: 600;
    font-size: clamp(38px, 5.4vw, 62px);
    line-height: 1.05;
    color: #f5e6cd;
    letter-spacing: 0.02em;
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.55);
    background: linear-gradient(180deg, #fbecd2 0%, #e6c189 80%, #c9a06b 100%);
    -webkit-background-clip: text;
            background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: titleFadeUp 900ms 160ms var(--ease-out) both;
  }

  .title-text-block .subtitle {
    font-family: var(--ui-serif);
    color: #e7d6bd;
    font-size: clamp(17px, 1.7vw, 21px);
    line-height: 1.7;
    letter-spacing: 0.06em;
    margin: 0;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
    animation: titleFadeUp 900ms 320ms var(--ease-out) both;
  }

  .title-text-block .title-cta {
    margin-top: 22px;
    align-self: flex-start;
    padding: 16px 32px;
    font-size: 15px;
    letter-spacing: 0.18em;
    animation:
      titleFadeUp 900ms 480ms var(--ease-out) both,
      ctaBreath 4.5s 1.4s ease-in-out infinite;
  }

  @keyframes titleFadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes ctaBreath {
    0%, 100% {
      box-shadow:
        var(--shadow-sm),
        0 0 0 1px rgba(215, 176, 118, 0.20),
        0 0 0 0 rgba(215, 176, 118, 0.0),
        var(--shadow-inset);
    }
    50% {
      box-shadow:
        var(--shadow-sm),
        0 0 0 1px rgba(230, 193, 137, 0.40),
        0 0 36px rgba(215, 176, 118, 0.22),
        var(--shadow-inset);
    }
  }

  .footer-note {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.04em;
    opacity: 0.78;
  }

  .footer-note:empty {
    display: none;
  }

  .btn {
    appearance: none;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: var(--radius-md);
    background:
      linear-gradient(180deg, rgba(46, 38, 32, 0.92), rgba(28, 23, 20, 0.92));
    color: var(--text);
    font: 600 16px/1 var(--ui-sans);
    letter-spacing: 0.04em;
    padding: 14px 22px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      var(--shadow-sm),
      var(--shadow-inset);
    transition:
      transform 220ms var(--ease-out),
      background 220ms ease,
      border-color 220ms ease,
      box-shadow 260ms ease,
      color 220ms ease;
  }

  /* Sheen — 极细的高光扫过，hover 时浮现 */
  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(115deg, transparent 0%, rgba(255, 224, 178, 0.0) 30%, rgba(255, 224, 178, 0.10) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 600ms var(--ease-out);
    pointer-events: none;
  }

  .btn:hover::before,
  .btn:focus-visible::before {
    transform: translateX(100%);
  }

  .btn:hover,
  .btn:focus-visible {
    transform: translateY(-1px);
    background:
      linear-gradient(180deg, rgba(60, 49, 40, 0.95), rgba(36, 30, 25, 0.95));
    border-color: rgba(215, 176, 118, 0.5);
    box-shadow:
      0 12px 26px rgba(0, 0, 0, 0.34),
      0 0 0 1px rgba(215, 176, 118, 0.22),
      var(--shadow-inset);
    color: var(--accent-strong);
    outline: none;
  }

  .btn:focus-visible {
    box-shadow:
      0 12px 26px rgba(0, 0, 0, 0.34),
      0 0 0 2px var(--accent-glow),
      var(--shadow-inset);
  }

  .btn:active {
    transform: translateY(0) scale(0.985);
    transition-duration: 90ms;
    box-shadow:
      0 4px 10px rgba(0, 0, 0, 0.28),
      inset 0 1px 2px rgba(0, 0, 0, 0.18);
  }

  .btn:disabled,
  .btn[aria-disabled="true"] {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  .btn.secondary {
    color: var(--muted);
    background: rgba(20, 17, 15, 0.62);
    box-shadow: var(--shadow-inset);
  }

  .btn.secondary:hover,
  .btn.secondary:focus-visible {
    color: var(--text);
  }

  .btn.ghost {
    background: transparent;
    box-shadow: none;
    border-color: rgba(255, 255, 255, 0.10);
  }

  .btn.ghost:hover,
  .btn.ghost:focus-visible {
    background: rgba(255, 255, 255, 0.04);
    box-shadow: none;
  }

  .btn.primary {
    background:
      linear-gradient(180deg, rgba(95, 70, 46, 0.96), rgba(56, 42, 30, 0.96));
    border-color: rgba(215, 176, 118, 0.42);
    color: #fbecd2;
  }

  .btn.primary:hover,
  .btn.primary:focus-visible {
    background:
      linear-gradient(180deg, rgba(118, 88, 58, 0.98), rgba(70, 52, 36, 0.98));
    border-color: rgba(230, 193, 137, 0.75);
    color: #fff4dd;
    box-shadow:
      0 14px 30px rgba(0, 0, 0, 0.38),
      0 0 0 1px rgba(215, 176, 118, 0.30),
      0 0 28px rgba(215, 176, 118, 0.18),
      var(--shadow-inset);
  }

  .news-chip,
  .audio-chip,
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    padding: 10px 16px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    background: rgba(18, 15, 13, 0.7);
    color: var(--muted);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: var(--shadow-md);
    letter-spacing: 0.04em;
    transition:
      color var(--duration-fast) ease,
      border-color var(--duration-fast) ease,
      transform var(--duration-fast) var(--ease-out),
      box-shadow var(--duration-fast) ease;
  }

  .news-chip {
    position: absolute;
    left: 24px;
    top: 24px;
    max-width: min(460px, calc(100% - 170px));
    border-radius: var(--radius-lg);
    padding: 12px 16px;
    align-items: flex-start;
    display: grid;
    gap: 4px;
    background:
      linear-gradient(180deg, rgba(24, 20, 16, 0.82), rgba(15, 13, 11, 0.78));
    border: 1px solid var(--line-warm);
  }

  .audio-chip {
    position: absolute;
    right: 24px;
    top: 24px;
    cursor: pointer;
    z-index: 6;
    font: 600 13px/1 var(--ui-sans);
  }

  /* Round 10 fix: when audio-chip lives inside the topbar's action cluster
     (dialogue + selection screens), switch it to static flow so it doesn't
     overlap the sibling buttons. Other screens (title / breakfast / world /
     diary / end) keep the absolute corner position. */
  .topbar .audio-chip,
  .topbar-actions .audio-chip {
    position: static;
    right: auto;
    top: auto;
    padding: 8px 14px;
    font-size: 12px;
  }

  .audio-chip:hover {
    color: var(--accent-strong);
    border-color: rgba(215, 176, 118, 0.4);
    transform: translateY(-1px);
    box-shadow:
      var(--shadow-md),
      0 0 0 1px var(--accent-glow-soft);
  }

  .status-chip {
    color: var(--accent);
    background: rgba(215, 176, 118, 0.08);
    border-color: var(--line-warm);
  }

  .character-figure {
    position: absolute;
    bottom: 96px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    pointer-events: none;
    transform-origin: bottom center;
    z-index: 3;
    width: auto;
    max-width: 40%;
  }

  .character-figure.heroine {
    height: 56%;
  }

  .character-figure.male {
    height: 52%;
  }

  .character-figure.father {
    height: 50%;
  }

  .character-figure.mother {
    height: 48%;
  }

  .character-figure.left {
    left: 3%;
  }

  .character-figure.right {
    right: 3%;
  }

  .character-figure.center {
    left: 50%;
    transform: translateX(-50%);
    max-width: 34%;
  }

  .character-figure.large {
    max-width: 44%;
  }

  /* ---------- 场景级角色微调 ---------- */
  .scene-cafe .character-figure.heroine { height: 58%; }
  .scene-park .character-figure.heroine { height: 58%; }
  .scene-teahouse .character-figure.heroine { height: 54%; }

  .character-figure.enter-left {
    animation: characterSlideLeft 420ms cubic-bezier(.2, .8, .2, 1);
  }

  .character-figure.enter-right {
    animation: characterSlideRight 420ms cubic-bezier(.2, .8, .2, 1);
  }

  .character-figure.enter-up {
    animation: characterRise 420ms cubic-bezier(.2, .8, .2, 1);
  }

  .character-art {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    object-position: center bottom;
    filter:
      url(#trim-fringe)
      drop-shadow(0 20px 30px rgba(0, 0, 0, 0.40))
      drop-shadow(0 6px 12px rgba(0, 0, 0, 0.26))
      drop-shadow(0 1px 0 rgba(255, 224, 178, 0.06));
    image-rendering: -webkit-optimize-contrast;
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 92%, rgba(0,0,0,0.92) 100%);
            mask-image: linear-gradient(180deg, #000 0%, #000 92%, rgba(0,0,0,0.92) 100%);
  }

  /* 角色脚下的接地阴影（圆盘形虚化），让人物不像贴纸 */
  .character-figure::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -8px;
    width: 62%;
    height: 22px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.42), transparent 70%);
    filter: blur(6px);
    pointer-events: none;
    opacity: 0.7;
  }

  .dialogue-tray {
    position: absolute;
    left: 28px;
    right: 28px;
    bottom: 92px;
    padding: 24px 26px 26px;
    border-radius: var(--radius-xl);
    background:
      linear-gradient(180deg, rgba(20, 17, 14, 0.88), rgba(12, 10, 9, 0.86));
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow:
      0 26px 56px rgba(0, 0, 0, 0.46),
      var(--shadow-inset);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 4;
    animation: dialogueFade 380ms var(--ease-out);
  }

  /* 对话框顶部金色细线 — 像一条收口的金边 */
  .dialogue-tray::before {
    content: "";
    position: absolute;
    left: 26px;
    right: 26px;
    top: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(215, 176, 118, 0.40) 18%,
      rgba(215, 176, 118, 0.40) 82%,
      transparent 100%);
    pointer-events: none;
  }

  .dialogue-tray[hidden] {
    display: none;
  }

  .narration-panel {
    position: absolute;
    left: 50%;
    top: 88px;
    transform: translateX(-50%);
    width: min(58%, 540px);
    max-width: 540px;
    padding: 22px 24px 56px 28px;
    border-radius: var(--radius-lg);
    background: linear-gradient(180deg, rgba(22, 18, 14, 0.82), rgba(14, 12, 10, 0.78));
    border: 1px solid var(--line-warm);
    box-shadow:
      0 22px 52px rgba(0, 0, 0, 0.36),
      var(--shadow-inset);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 4;
    /* 用专属 keyframe — 不能用 dialogueFade，因为那会把 translateX(-50%) 覆盖掉，
       导致首次出现时 panel 从 left:50% 实位置闪现在屏幕右半边，动画结束才"跳"回中央。
       narrationFade 在 keyframe 内显式保留 translateX(-50%)，杜绝位置跳跃。 */
    animation: narrationFade 380ms var(--ease-out);
  }

  .narration-panel::before {
    content: "";
    position: absolute;
    left: 18px;
    top: 20px;
    bottom: 20px;
    width: 2px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--accent), rgba(215, 176, 118, 0.0));
    opacity: 0.7;
  }

  /* 文字开头的引号装饰 — 静雅的衬线感 */
  .narration-panel::after {
    content: "「";
    position: absolute;
    right: 18px;
    top: 12px;
    font-family: var(--ui-serif);
    font-size: 36px;
    color: var(--accent);
    opacity: 0.22;
    pointer-events: none;
    line-height: 1;
  }

  .narration-panel[hidden] {
    display: none;
  }

  .narration-label {
    display: inline-block;
    margin: 0 0 12px 14px;
    padding: 5px 14px;
    border-radius: var(--radius-pill);
    background: rgba(215, 176, 118, 0.14);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.20em;
    font-weight: 600;
    border: 1px solid rgba(215, 176, 118, 0.18);
  }

  .narration-text {
    /* 视觉小说阅读体验：sans 字体 + 中等字重 + 大行高 + 适度字距。
       原方案 font-style: italic + serif 在长段叙述下识别成本高，
       现改为正常字形、稍轻的字重、更宽的行高，让玩家舒服读完一整段。 */
    margin: 0 0 0 14px;
    font-size: clamp(16px, 1.7vw, 19px);
    line-height: 2.05;
    color: #ece1cd;
    font-family: var(--ui-sans);
    font-weight: 400;
    font-style: normal;
    white-space: pre-wrap;
    letter-spacing: 0.03em;
  }

  .narration-continue {
    position: absolute;
    right: 14px;
    bottom: 12px;
    appearance: none;
    border: 1px solid rgba(215, 176, 118, 0.34);
    border-radius: var(--radius-sm);
    background: rgba(48, 38, 28, 0.86);
    color: var(--accent-strong);
    font: 600 13px/1 var(--ui-sans);
    letter-spacing: 0.08em;
    padding: 9px 18px;
    cursor: pointer;
    box-shadow:
      0 4px 10px rgba(0, 0, 0, 0.24),
      var(--shadow-inset);
    transition:
      transform var(--duration-fast) var(--ease-out),
      background var(--duration-fast) ease,
      border-color var(--duration-fast) ease,
      box-shadow var(--duration-fast) ease;
  }

  .narration-continue:hover,
  .narration-continue:focus-visible {
    transform: translateY(-1px);
    background: rgba(64, 50, 36, 0.92);
    border-color: rgba(230, 193, 137, 0.6);
    box-shadow:
      0 6px 14px rgba(0, 0, 0, 0.30),
      0 0 0 1px var(--accent-glow-soft),
      var(--shadow-inset);
    outline: none;
  }

  .narration-continue:active {
    transform: translateY(0) scale(0.97);
  }

  .tray-text {
    margin: 0;
    line-height: 1.9;
    white-space: pre-wrap;
    font-size: clamp(16px, 1.7vw, 19px);
    color: #f3e8d4;
    letter-spacing: 0.02em;
  }

  .tray-text.fade-in,
  .narration-text.fade-in {
    animation: textFade 240ms var(--ease-out);
  }

  .dialogue-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: 18px;
  }

  .dialogue-speaker {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* speaker 名前的金色短条 — 像"主持人话筒"标识 */
  .dialogue-speaker::before {
    content: "";
    display: inline-block;
    width: 18px;
    height: 2px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), rgba(215, 176, 118, 0));
  }

  .dialogue-line {
    margin: 0;
    font-size: clamp(17px, 1.9vw, 21px);
    line-height: 1.85;
    letter-spacing: 0.02em;
    color: #f3e8d4;
  }

  .dialogue-line.player {
    color: #ead4b0;
  }

  .dialogue-line.reply {
    margin-top: 12px;
  }

  .environment-hint {
    position: absolute;
    left: 50%;
    top: 17%;
    transform: translateX(-50%);
    max-width: min(560px, calc(100% - 48px));
    padding: 12px 22px;
    border-radius: var(--radius-pill);
    background: rgba(13, 12, 10, 0.78);
    border: 1px solid var(--line-warm);
    color: #f0e4d6;
    font-size: 14px;
    line-height: 1.6;
    text-align: center;
    letter-spacing: 0.06em;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: var(--shadow-md);
    z-index: 4;
  }

  .environment-hint[hidden] {
    display: none;
  }

  /* Round 10: controls-panel is no longer an absolute overlay (it caused the
     "continue" button to be covered when the dialogue tray grew to multi-line).
     The element is preserved as a transparent inline wrapper so that any
     external code referencing the class doesn't break, but the actual controls
     are rendered inside .dialogue-tray-controls (embedded in the tray). */
  .controls-panel {
    /* legacy class kept inert for back-compat */
    position: static;
    display: contents;
  }

  .dialogue-tray-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding-bottom: 14px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }

  .dialogue-tray-controls[hidden] {
    display: none;
  }

  .response-panel {
    position: absolute;
    left: 28px;
    right: 28px;
    bottom: 266px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    z-index: 4;
  }

  .response-btn {
    min-height: 104px;
    text-align: left;
    padding: 18px 20px 18px 22px;
    line-height: 1.6;
    border-radius: var(--radius-lg);
    background:
      linear-gradient(180deg, rgba(34, 28, 24, 0.92), rgba(22, 18, 15, 0.92));
    border: 1px solid rgba(255, 255, 255, 0.08);
    position: relative;
    box-shadow:
      0 8px 20px rgba(0, 0, 0, 0.26),
      var(--shadow-inset);
    /* 卡片左侧那条若隐若现的金色边线，hover 时亮起 */
  }

  .response-btn::before {
    content: "";
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 3px;
    border-radius: 2px;
    background: linear-gradient(180deg, var(--accent), rgba(215, 176, 118, 0));
    opacity: 0.0;
    transition: opacity var(--duration-base) var(--ease-out);
  }

  /* sheen 扫光 — 继承自 .btn::before，强度调低 */
  .response-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(115deg, transparent 0%, rgba(255, 224, 178, 0.0) 30%, rgba(255, 224, 178, 0.08) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 700ms var(--ease-out);
    pointer-events: none;
    border-radius: inherit;
  }

  .response-btn:hover::after,
  .response-btn:focus-visible::after {
    transform: translateX(100%);
  }

  .response-btn:hover,
  .response-btn:focus-visible {
    border-color: rgba(215, 176, 118, 0.55);
    background:
      linear-gradient(180deg, rgba(50, 41, 32, 0.96), rgba(30, 25, 20, 0.96));
    transform: translateY(-2px);
    box-shadow:
      0 14px 30px rgba(0, 0, 0, 0.36),
      0 0 0 1px var(--accent-glow-soft),
      var(--shadow-inset);
    outline: none;
  }

  .response-btn:hover::before,
  .response-btn:focus-visible::before {
    opacity: 1;
  }

  .response-btn:active {
    transform: translateY(0) scale(0.99);
    transition-duration: 90ms;
  }

  .response-btn strong {
    display: block;
    margin-bottom: 8px;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 0.06em;
    font-weight: 600;
    transition: color var(--duration-fast) ease;
  }

  .response-btn:hover strong,
  .response-btn:focus-visible strong {
    color: var(--accent-strong);
  }

  .response-btn span {
    color: #ead8bd;
    font-size: 14px;
    line-height: 1.65;
    letter-spacing: 0.01em;
  }

  .selection-shell {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 40px 32px 54px;
  }

  .selection-row {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, minmax(180px, 1fr));
    gap: 22px;
    align-items: end;
    max-width: 980px;
    margin-top: 80px;
  }

  /* 卡片入场 stagger */
  .selection-row .pick-card:nth-child(1) { animation: pickEnter 600ms 60ms var(--ease-out) both; }
  .selection-row .pick-card:nth-child(2) { animation: pickEnter 600ms 180ms var(--ease-out) both; }
  .selection-row .pick-card:nth-child(3) { animation: pickEnter 600ms 300ms var(--ease-out) both; }

  @keyframes pickEnter {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pick-card {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    padding: 0;
    transition: transform 320ms var(--ease-out);
  }

  .pick-card:hover,
  .pick-card:focus-visible {
    transform: translateY(-8px);
    outline: none;
  }

  .pick-card:hover .pick-stage,
  .pick-card:focus-visible .pick-stage {
    border-color: rgba(215, 176, 118, 0.55);
    box-shadow:
      0 34px 70px rgba(0, 0, 0, 0.52),
      0 0 0 1px rgba(215, 176, 118, 0.24),
      0 0 50px rgba(215, 176, 118, 0.10);
  }

  .pick-card:hover .pick-name,
  .pick-card:focus-visible .pick-name {
    color: var(--accent-strong);
    letter-spacing: 0.22em;
  }

  .pick-card.is-experienced .pick-stage {
    border-color: rgba(215, 176, 118, 0.28);
  }

  .pick-card.is-experienced .pick-name {
    color: #f4e6cc;
  }

  .pick-stage {
    position: relative;
    min-height: 420px;
    border-radius: var(--radius-xl);
    background:
      linear-gradient(180deg, rgba(40, 33, 26, 0.46), rgba(15, 13, 11, 0.62));
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow:
      0 20px 42px rgba(0, 0, 0, 0.34),
      var(--shadow-inset);
    overflow: hidden;
    transition:
      border-color 320ms var(--ease-out),
      box-shadow 320ms var(--ease-out);
  }

  /* 顶部金色细高光线 */
  .pick-stage::before {
    content: "";
    position: absolute;
    left: 18%;
    right: 18%;
    top: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(215, 176, 118, 0.42),
      transparent);
    pointer-events: none;
  }

  .pick-stage::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 160px;
    background: linear-gradient(180deg, rgba(0,0,0,0), rgba(15,13,11,0.84) 38%, rgba(15,13,11,0.98));
  }

  .pick-stage .character-art {
    /* 角色卡统一缩放规则：以 HEIGHT 为主导，所有素材高度对齐。
       素材高宽比差异极大（陈思远 0.66 竖图 / 林哲 1.02 近正方形 / 周文涵 0.86），
       原本用统一 width 会导致每个角色实际高度差 30%。改为统一 height + max-width
       兜底，保证三人头顶在同一水平线、底部站位一致、视觉重量统一。 */
    position: absolute;
    left: 50%;
    bottom: 32px;
    transform: translateX(-50%);
    height: clamp(280px, 36vh, 360px);
    width: auto;
    max-width: 92%;
    object-fit: contain;
    object-position: center bottom;
    transition: transform 360ms var(--ease-out);
  }

  .pick-card:hover .pick-stage .character-art,
  .pick-card:focus-visible .pick-stage .character-art {
    transform: translateX(-50%) scale(1.04);
  }

  .pick-name {
    position: absolute;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    z-index: 1;
    color: #efe1cb;
    font-size: 17px;
    letter-spacing: 0.18em;
    font-weight: 500;
    transition:
      color 280ms ease,
      letter-spacing 320ms var(--ease-out);
  }

  .pick-badge {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: var(--radius-pill);
    background: rgba(15, 13, 11, 0.78);
    border: 1px solid rgba(215, 176, 118, 0.22);
    color: var(--accent-strong);
    font-size: 12px;
    letter-spacing: 0.08em;
    box-shadow: var(--shadow-sm);
  }

  .world-cta {
    position: absolute;
    left: 50%;
    bottom: 34px;
    transform: translateX(-50%);
    z-index: 4;
  }

  .world-heroine {
    position: absolute;
    left: 50%;
    bottom: 108px;
    transform: translateX(-50%);
    width: min(18vw, 210px);
    height: min(62%, calc(100% - 148px));
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 3;
  }

  .world-heroine .character-art {
    max-height: 100%;
  }

  .world-vignette {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at center, transparent 0 26%, rgba(0,0,0,0.08) 58%, rgba(0,0,0,0.34) 100%),
      linear-gradient(180deg, rgba(8,7,6,0.12), rgba(8,7,6,0.38));
    pointer-events: none;
  }

  .diary-scene {
    position: relative;
    min-height: min(92vh, 920px);
    background:
      linear-gradient(180deg, rgba(11, 9, 7, 0.38), rgba(11, 9, 7, 0.56)),
      var(--scene-image, none);
    background-size: cover;
    background-position: center;
  }

  .desk-glow {
    position: absolute;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%);
    width: min(760px, calc(100% - 36px));
    height: min(620px, calc(100% - 80px));
    border-radius: 32px;
    background: radial-gradient(circle at center, rgba(255, 220, 170, 0.18), transparent 68%);
    pointer-events: none;
  }

  .diary-sheet {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(-1deg);
    width: min(720px, calc(100% - 40px));
    min-height: 620px;
    padding: 38px 44px 38px 46px;
    border-radius: var(--radius-xl);
    background:
      repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0) 0 39px,
        var(--paper-line) 39px 40px
      ),
      linear-gradient(180deg, var(--surface-paper-warm), var(--surface-paper));
    box-shadow:
      0 36px 76px rgba(0, 0, 0, 0.32),
      0 0 0 1px rgba(133, 96, 60, 0.10),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    color: var(--text-paper);
    font-family: var(--ui-hand);
    animation: diaryDrop 700ms var(--ease-spring) both;
  }

  /* 纸张左上角装饰：很淡的金色花纹角 */
  .diary-sheet::before {
    content: "";
    position: absolute;
    left: 22px;
    top: 22px;
    width: 28px;
    height: 28px;
    border-left: 1px solid rgba(184, 138, 82, 0.36);
    border-top: 1px solid rgba(184, 138, 82, 0.36);
    pointer-events: none;
  }

  .diary-sheet::after {
    content: "";
    position: absolute;
    right: 22px;
    bottom: 22px;
    width: 28px;
    height: 28px;
    border-right: 1px solid rgba(184, 138, 82, 0.36);
    border-bottom: 1px solid rgba(184, 138, 82, 0.36);
    pointer-events: none;
  }

  @keyframes diaryDrop {
    from {
      opacity: 0;
      transform: translate(-50%, -46%) rotate(-3deg);
    }
    to {
      opacity: 1;
      transform: translate(-50%, -50%) rotate(-1deg);
    }
  }

  .diary-sheet h2 {
    margin: 0 0 10px;
    font-size: 36px;
    font-weight: 500;
    color: var(--text-paper);
  }

  .diary-meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 26px;
    padding-bottom: 14px;
    border-bottom: 1px dashed rgba(133, 96, 60, 0.26);
    color: #7f5f45;
    font-size: 17px;
  }

  .diary-sheet p {
    margin: 0;
    font-size: 24px;
    line-height: 2.1;
    white-space: pre-wrap;
  }

  .footer-note {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.04em;
    opacity: 0.78;
  }

  .footer-note:empty {
    display: none;
  }

  /* dedupe: 原始定义被 title-block 节增强后移除 */

  @keyframes sceneFade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes characterSlideLeft {
    from { opacity: 0; transform: translateX(-36px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes loadingPulse {
    0%, 100% { opacity: 0.55; }
    50% { opacity: 1; }
  }

  .loading-pulse {
    animation: loadingPulse 1.8s ease-in-out infinite;
  }

  @keyframes characterSlideRight {
    from { opacity: 0; transform: translateX(36px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes characterRise {
    from { opacity: 0; transform: translate(-50%, 36px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  @keyframes dialogueFade {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* narration-panel 专属：保留 translateX(-50%) 实现真居中，避免首帧位置跳跃 */
  @keyframes narrationFade {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  @keyframes textFade {
    from { opacity: 0.0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes hintCycle {
    0% { opacity: 0; transform: translate(-50%, 10px); }
    20% { opacity: 1; transform: translate(-50%, 0); }
    72% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -8px); }
  }

  @media (max-width: 980px) {
    .character-figure {
      max-width: 42%;
    }

    .character-figure.heroine {
      height: 50%;
    }

    .character-figure.male {
      height: 48%;
    }

    .character-figure.father,
    .character-figure.mother {
      height: 46%;
    }

    .character-figure.large {
      max-width: 46%;
    }

    .narration-panel {
      width: min(78%, 480px);
      top: 80px;
      padding: 16px 20px 50px;
    }

    .response-panel {
      grid-template-columns: 1fr;
    }

    .selection-row {
      grid-template-columns: 1fr;
      max-width: 300px;
      margin-top: 40px;
    }

    .pick-stage {
      min-height: 320px;
    }

    .pick-stage .character-art {
      /* 移动端同步用 height 主导，与桌面端规则一致 */
      height: clamp(220px, 38vh, 280px);
      width: auto;
      max-width: 90%;
    }
  }

  @media (max-width: 720px) {
    #app {
      padding: 10px;
    }

    .screen,
    .full-scene,
    .diary-scene {
      min-height: 96vh;
      border-radius: 22px;
    }

    .title-block {
      left: 18px;
      right: 18px;
      top: 18px;
      max-width: none;
    }

    .title-shell {
      justify-content: flex-end;
      align-items: flex-end;
      padding: 30px 18px 34px;
    }

    .title-text-block {
      max-width: min(58%, 240px);
      margin-left: auto;
      gap: 10px;
    }

    .title-cover {
      background-position: 22% 34%;
      background-size: cover;
    }

    .title-text-block .title-cta {
      align-self: stretch;
    }

    .news-chip {
      left: 14px;

<body>
<svg width="0" height="0" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true" focusable="false">
  <defs>
    <!-- trim-fringe: 收紧 alpha 通道，剔除 PNG 抠图的半透明白边/锯齿；
         feMorphology 腐蚀外圈一小圈像素，再 Gaussian 重新柔化，
         最后用收紧后的 alpha 作为 mask 重组源色，保证主体不掉细节。 -->
    <filter id="trim-fringe" x="-3%" y="-3%" width="106%" height="106%" color-interpolation-filters="sRGB">
      <feMorphology operator="erode" radius="0.6" in="SourceAlpha" result="er"/>
      <feGaussianBlur in="er" stdDeviation="0.55" result="soft"/>
      <feComponentTransfer in="soft" result="alphaCurve">
        <feFuncA type="linear" slope="1.6" intercept="-0.25"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="alphaCurve" operator="in"/>
    </filter>
  </defs>
</svg>
<div id="app"></div>

<script>
const ASSET_INDEX = {
  scenes: [
    "bg_00 open.png",
    "bg_01_home.png",
    "bg_02_cafe.png",
    "bg_03_teahouse.png",
    "bg_04_park.png",
    "bg_05_milktea.png"
  ],
  posters: [
    "poster_male_fertility_plan.png"
  ],
  characters: [
    "char_00_player.png",
    "char_01_chensiyuan.png",
    "char_02_cafe.png",
    "char_02_linzhe.png",
    "char_03_teahouse.png",
    "char_03_zhouwenhan.png",
    "char_04_park.png",
    "char_04_songxiao.png",
    "char_05_dad.png",
    "char_06_mom.png"
  ]
};

function buildAssetRegistry(index) {
  const registry = {};
  Object.entries(index).forEach(([group, files]) => {
    registry[group] = {};
    files.forEach((file) => {
      const key = file.replace(/\.[^.]+$/, "");
      const basePath = group === "characters" ? "generated_characters" : `assets/${group}`;
      let mobilePath = "";
      if (group === "characters") {
        mobilePath = `generated_characters/mobile/${key}.webp`;
      } else if (group === "scenes" || group === "posters") {
        mobilePath = `assets/mobile/${group}/${key}.webp`;
      }
      registry[group][key] = {
        file,
        path: `${basePath}/${file}`,
        mobilePath
      };
    });
  });
  return registry;
}

const ASSETS = buildAssetRegistry(ASSET_INDEX);

const PERF_STATE = {
  lite: false,
  prefersReducedMotion: false,
  supportsWebp: false
};

const AUDIO_TRACKS = {
  breakfast: {
    id: "breakfast",
    file: "bgm_breakfast.m4a",
    path: "assets/audio/bgm/bgm_breakfast.m4a",
    mime: "audio/mp4",
    loop: true,
    volume: 0.3,
    kind: "bgm"
  },
  news_breakfast: {
    id: "news_breakfast",
    file: "news_breakfast.mp3",
    path: "assets/audio/news/news_breakfast.mp3",
    mime: "audio/mpeg",
    loop: false,
    volume: 0.65,
    kind: "news"
  },
  world: {
    id: "world",
    file: "bgm_world.m4a",
    path: "assets/audio/bgm/bgm_world.m4a",
    mime: "audio/mp4",
    loop: true,
    volume: 0.3,
    kind: "bgm"
  },
  cafe: {
    id: "cafe",
    file: "bgm_cafe.m4a",
    path: "assets/audio/bgm/bgm_cafe.m4a",
    mime: "audio/mp4",
    loop: true,
    volume: 0.3,
    kind: "bgm"
  },
  teahouse: {
    id: "teahouse",
    file: "bgm_teahouse.m4a",
    path: "assets/audio/bgm/bgm_teahouse.m4a",
    mime: "audio/mp4",
    loop: true,
    volume: 0.3,
    kind: "bgm"
  },
  park: {
    id: "park",
    file: "bgm_park.m4a",
    path: "assets/audio/bgm/bgm_park.m4a",
    mime: "audio/mp4",
    loop: true,
    volume: 0.3,
    kind: "bgm"
  },
  diary: {
    id: "diary",
    file: "bgm_diary.m4a",
    path: "assets/audio/bgm/bgm_diary.m4a",
    mime: "audio/mp4",
    loop: true,
    volume: 0.3,
    kind: "bgm"
  }
};

const AUDIO_MAP = {
  title: {
    primary: "world"
  },
  breakfast: {
    primary: "news_breakfast"
  },
  world: {
    primary: "world"
  },
  selection: {
    primary: "world"
  },
  dialogue: {
    chensiyuan: {
      primary: "cafe"
    },
    linzhe: {
      primary: "teahouse"
    },
    zhouwenhan: {
      primary: "park"
    }
  },
  diary: {
    primary: "diary"
  },
  end: {
    primary: "world"
  }
};

const CHARACTER_ROLE_CLASS = {
  char_00_player: "heroine",
  char_02_cafe: "heroine",
  char_03_teahouse: "heroine",
  char_04_park: "heroine",
  char_04_songxiao: "heroine",
  char_05_dad: "father",
  char_06_mom: "mother",
  char_01_chensiyuan: "male",
  char_02_linzhe: "male",
  char_03_zhouwenhan: "male"
};

const AUDIO_STATE = {
  element: null,
  currentTrackId: null,
  playing: false,
  userActivated: false,
  manuallyPaused: false,
  autoplayBlocked: false,
  lastError: null,
  verifiedPath: "",
  canLoop: false,
  canPauseResume: false,
  loaded: false,
  formatSupport: ""
};

function detectWebpSupport() {
  try {
    const canvas = document.createElement("canvas");
    return canvas.toDataURL("image/webp").startsWith("data:image/webp");
  } catch {
    return false;
  }
}

function applyPerformanceMode() {
  const coarsePointer = typeof window.matchMedia === "function"
    && window.matchMedia("(hover: none) and (pointer: coarse)").matches;
  const narrowViewport = typeof window.matchMedia === "function"
    && window.matchMedia("(max-width: 820px)").matches;
  const reducedMotion = typeof window.matchMedia === "function"
    && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  PERF_STATE.prefersReducedMotion = reducedMotion;
  PERF_STATE.lite = coarsePointer || narrowViewport || reducedMotion;
  PERF_STATE.supportsWebp = detectWebpSupport();
  document.body.classList.toggle("perf-lite", PERF_STATE.lite);
}

function assetPath(group, key) {
  const asset = ASSETS[group] && ASSETS[group][key] ? ASSETS[group][key] : null;
  if (!asset) return "";
  if (PERF_STATE.lite && PERF_STATE.supportsWebp && asset.mobilePath) {
    return asset.mobilePath;
  }
  return asset.path;
}

function buildHeroineSceneMap() {
  const keys = Object.keys(ASSETS.characters);
  const heroineKeys = keys.filter((key) => !/(chensiyuan|linzhe|zhouwenhan|songxiao|dad|mom)/.test(key));
  const fallback = heroineKeys.find((key) => key.includes("player")) || heroineKeys[0];
  const map = { default: fallback };
  ["home", "cafe", "teahouse", "park", "milktea"].forEach((sceneKey) => {
    map[sceneKey] = heroineKeys.find((key) => key.includes(sceneKey)) || fallback;
  });
  return map;
}

const HEROINE_BY_SCENE = buildHeroineSceneMap();

function sceneKeyword(sceneId) {
  return sceneId.replace(/^bg_\d+_/, "");
}

function heroineKeyForScene(sceneId) {
  return HEROINE_BY_SCENE[sceneKeyword(sceneId)] || HEROINE_BY_SCENE.default;
}

function characterRoleClass(key) {
  return CHARACTER_ROLE_CLASS[key] || "";
}

function characterFigure(key, alt, placementClass, extraClasses = "") {
  return `
    <div class="character-figure ${placementClass} ${characterRoleClass(key)} ${extraClasses}">
      <img class="character-art" src="${assetPath("characters", key)}" alt="${alt}" decoding="async">
    </div>
  `;
}

function renderAudioChip() {
  const currentConfig = currentAudioConfigForState();
  const audioTypeLabel = currentConfig && currentConfig.kind === "news" ? "新闻" : "BGM";
  const label = !AUDIO_STATE.userActivated
    ? `🔊 开启${audioTypeLabel}`
    : AUDIO_STATE.playing
      ? `⏸ 暂停${audioTypeLabel}`
      : `🔊 继续${audioTypeLabel}`;
  return `<button class="audio-chip" data-audio-chip="true" data-action="toggle-audio">${label}</button>`;
}

function ensureAudioElement() {
  if (AUDIO_STATE.element) return AUDIO_STATE.element;
  const audio = new Audio();
  audio.preload = "none";
  audio.loop = false;
  audio.volume = 0.3;
  AUDIO_STATE.canLoop = false;
  AUDIO_STATE.formatSupport = audio.canPlayType(AUDIO_TRACKS.breakfast.mime) || "";
  audio.addEventListener("loadeddata", () => {
    AUDIO_STATE.loaded = true;
    render();
  });
  audio.addEventListener("play", () => {
    AUDIO_STATE.playing = true;
    render();
  });
  audio.addEventListener("pause", () => {
    AUDIO_STATE.playing = false;
    render();
  });
  audio.addEventListener("error", () => {
    AUDIO_STATE.lastError = audio.error ? audio.error.message || String(audio.error.code) : "audio-error";
    AUDIO_STATE.playing = false;
    render();
  });
  AUDIO_STATE.element = audio;
  return audio;
}

async function playAudioTrack(trackId) {
  const track = AUDIO_TRACKS[trackId];
  if (!track || !AUDIO_STATE.userActivated) return false;
  const audio = ensureAudioElement();
  if (AUDIO_STATE.currentTrackId !== track.id || !audio.src.endsWith(track.path)) {
    audio.src = track.path;
    AUDIO_STATE.currentTrackId = track.id;
    AUDIO_STATE.verifiedPath = track.path;
    AUDIO_STATE.loaded = false;
  }
  audio.preload = "metadata";
  audio.loop = Boolean(track.loop);
  audio.volume = track.volume ?? 0.3;
  AUDIO_STATE.canLoop = audio.loop === true;
  AUDIO_STATE.manuallyPaused = false;
  AUDIO_STATE.formatSupport = audio.canPlayType(track.mime) || "";
  try {
    await audio.play();
    AUDIO_STATE.autoplayBlocked = false;
    AUDIO_STATE.lastError = null;
    AUDIO_STATE.playing = true;
    return true;
  } catch (error) {
    AUDIO_STATE.autoplayBlocked = true;
    AUDIO_STATE.lastError = error && error.message ? error.message : String(error);
    AUDIO_STATE.playing = false;
    render();
    return false;
  }
}

function pauseAudioTrack() {
  if (!AUDIO_STATE.element) return;
  AUDIO_STATE.element.pause();
}

function toggleAudioTrack() {
  if (AUDIO_STATE.playing) {
    AUDIO_STATE.canPauseResume = true;
    AUDIO_STATE.manuallyPaused = true;
    pauseAudioTrack();
    return;
  }
  AUDIO_STATE.canPauseResume = true;
  AUDIO_STATE.manuallyPaused = false;
  const trackId = currentTrackIdForState();
  if (trackId) {
    playAudioTrack(trackId);
  }
}

function currentAudioConfigForState() {
  if (STATE.screen === "dialogue") {
    const trackId = AUDIO_MAP.dialogue[STATE.selectedNpcId]?.primary || null;
    return trackId ? { trackId, kind: AUDIO_TRACKS[trackId]?.kind || "bgm" } : null;
  }
  const trackId = AUDIO_MAP[STATE.screen]?.primary || null;
  return trackId ? { trackId, kind: AUDIO_TRACKS[trackId]?.kind || "bgm" } : null;
}

function currentTrackIdForState() {
  return currentAudioConfigForState()?.trackId || null;
}

function syncAudioForState(forcePlay = false) {
  if (!AUDIO_STATE.userActivated) return;
  const trackId = currentTrackIdForState();
  if (!trackId) return;
  if (AUDIO_STATE.currentTrackId === trackId) {
    if (forcePlay && !AUDIO_STATE.playing && !AUDIO_STATE.manuallyPaused) {
      playAudioTrack(trackId);
    }
    return;
  }
  if (AUDIO_STATE.manuallyPaused && !forcePlay) {
    AUDIO_STATE.currentTrackId = trackId;
    AUDIO_STATE.verifiedPath = AUDIO_TRACKS[trackId].path;
    return;
  }
  playAudioTrack(trackId);
}

function escapeHtml(text) {
  return String(text)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}

function stripMd(text) {
  return String(text || "")
    .replace(/\*\*/g, "")
    .replace(/__+/g, "")
    .replace(/`/g, "")
    .replace(/\[\[(.+?)\]\]/g, "$1")
    .replace(/\[(.+?)\]\(.+?\)/g, "$1")
    .replace(/^>\s*/gm, "")
    .replace(/^\s*[-*]\s*/gm, "")
    .replace(/\s+/g, " ")
    .trim();
}

function trimParens(text) {
  return stripMd(text).replace(/^（/, "").replace(/）$/, "").trim();
}

function splitLeadingStageDirection(text) {
  const cleaned = stripMd(text).trim();
  let rest = cleaned;
  const stage = [];
  while (rest.startsWith("（")) {
    const match = rest.match(/^（([^）]+)）\s*/);
    if (!match) break;
    stage.push(match[1].trim());
    rest = rest.slice(match[0].length).trim();
  }
  return {
    stage: stage.join("，"),
    spoken: rest
  };
}

// --- Parser metadata classifiers --------------------------------------------
// These keep Markdown control / dev-note content OUT of displayContent.
// Anything they catch is treated as metadata and never reaches the UI.

function stripAllStageDirections(text) {
  return String(text || "")
    .replace(/（[^）]*）/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function isPureSystemMarker(rawLine) {
  const trimmed = String(rawLine || "").trim();
  if (!trimmed) return false;
  // （展开自动X） — block-level auto-transition cue
  if (/^（展开自动[^）]*）$/.test(trimmed)) return true;
  // （自动播放X） without 结束 marker — pure system cue
  if (/^（自动播放）$/.test(trimmed)) return true;
  if (/^（自动播放[^结][^）]*）$/.test(trimmed)) return true;
  return false;
}

function isDevMetaParagraph(rawLine) {
  const stripped = String(rawLine || "")
    .replace(/^\s*[-*]\s*/, "")
    .trim();
  if (!stripped) return false;
  if (/^过渡对话/.test(stripped)) return true;
  if (/^若(之前选|选了|选)/.test(stripped)) return true;
  if (/^无论(瑶珍|哪|什么|怎么)/.test(stripped)) return true;
  if (/^两个方向/.test(stripped)) return true;
  if (/^两条路径/.test(stripped)) return true;
  if (/^瑶珍的回应/.test(stripped)) return true;
  return false;
}

function extractAutoPlayObservation(rawLine) {
  // （自动播放结束。X）—— the 自动播放结束 prefix is a control marker,
  // X is the lingering observation that DOES belong to displayContent.
  const trimmed = String(rawLine || "").trim();
  const match = trimmed.match(/^（自动播放结束。(.+?)）$/);
  return match ? match[1].trim() : null;
}

function stripDirectorCuePrefix(text) {
  return String(text || "").replace(/^背景变暗[。.]\s*/, "").trim();
}

function splitLevel2Sections(markdown) {
  const parts = String(markdown || "").split(/\n(?=##\s+)/);
  return parts.filter((part) => part.trim().startsWith("## "));
}

function splitLevel3Sections(markdown) {
  const parts = String(markdown || "").split(/\n(?=###\s+)/);
  return parts.filter((part) => part.trim().startsWith("### "));
}

function findSectionByPrefix(markdown, prefix) {
  return splitLevel2Sections(markdown).find((section) => section.trim().startsWith(prefix)) || "";
}

function normalizeNarrationLine(line) {
  return trimParens(
    String(line || "")
      .replace(/^>\s*/, "")
      .replace(/^\s*[-*]\s*/, "")
  );
}

function parseSectionSequence(section) {
  const lines = String(section || "").split(/\r?\n/);
  const items = [];
  let inTrigger = false;

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    if (line.startsWith("## ") || line.startsWith("### ") || line === "---") continue;
    if (line.startsWith("**玩家选择")) break;
    if (line.startsWith("|")) break;
    if (line.startsWith("**触发关键句**") || line.startsWith("**触发**")) {
      inTrigger = true;
      continue;
    }

    if (isPureSystemMarker(line)) continue;
    if (isDevMetaParagraph(line)) continue;

    const observation = extractAutoPlayObservation(line);
    if (observation) {
      items.push({
        kind: "narration",
        text: observation,
        emphasis: inTrigger ? "trigger" : "normal"
      });
      continue;
    }

    if (line.startsWith(">")) {
      const cleaned = line.replace(/^>\s*/, "");
      const match = cleaned.match(/^\*\*([^*]+)\*\*[：:]\s*(.+)$/) || cleaned.match(/^([^：:]+)[：:]\s*(.+)$/);
      if (match) {
        const parsed = splitLeadingStageDirection(match[2]);
        const spoken = stripAllStageDirections(parsed.spoken);
        if (spoken) {
          items.push({
            kind: "dialogue",
            speaker: stripMd(match[1]),
            text: spoken
          });
        }
        continue;
      }
      let narration = normalizeNarrationLine(cleaned);
      if (inTrigger) narration = stripDirectorCuePrefix(narration);
      if (narration) {
        items.push({
          kind: "narration",
          text: narration,
          emphasis: inTrigger ? "trigger" : "normal"
        });
      }
      continue;
    }

    if (line.startsWith("**触发关键句")) continue;

    const narration = normalizeNarrationLine(line);
    if (!narration) continue;
    items.push({
      kind: "narration",
      text: narration,
      emphasis: inTrigger ? "trigger" : "normal"
    });
  }

  return items;
}

function parseMarkdownTable(section) {
  const lines = section.split(/\r?\n/).filter((line) => line.trim().startsWith("|"));
  if (lines.length < 3) return [];
  const headers = lines[0].split("|").slice(1, -1).map((cell) => stripMd(cell));
  return lines.slice(2).map((line) => {
    const cells = line.split("|").slice(1, -1).map((cell) => stripMd(cell));
    const row = {};
    headers.forEach((header, index) => {
      row[header] = cells[index] || "";
    });
    return row;
  });
}

function parseBreakfastDaySection(section) {
  const lines = [];
  let news = "";
  let pendingSpeaker = "";
  for (const rawLine of String(section || "").split(/\r?\n/)) {
    const line = rawLine.trim();
    if (!line) continue;
    if (line.startsWith("**新闻**：")) {
      news = stripMd(line.replace("**新闻**：", ""));
      continue;
    }
    const speakerMatch = line.match(/^\*\*(爸爸|妈妈|瑶珍)\*\*(?:（[^）]+）)?[：:]\s*(.*)$/);
    if (speakerMatch) {
      pendingSpeaker = speakerMatch[1];
      const parsed = splitLeadingStageDirection(speakerMatch[2]);
      const spoken = stripAllStageDirections(parsed.spoken);
      if (spoken) {
        lines.push({ speaker: pendingSpeaker, text: spoken });
        pendingSpeaker = "";
      }
      continue;
    }
    if (pendingSpeaker && line.startsWith(">")) {
      const parsed = splitLeadingStageDirection(line.replace(/^>\s*/, ""));
      const spoken = stripAllStageDirections(parsed.spoken);
      if (spoken) {
        lines.push({ speaker: pendingSpeaker, text: spoken });
        pendingSpeaker = "";
      }
    }
  }
  return {
    scene: "bg_01_home",
    news,
    lines
  };
}

function parseBreakfastMarkdown(markdown) {
  const days = {
    day1: parseBreakfastDaySection(findSectionByPrefix(markdown, "## Day 1")),
    day2: parseBreakfastDaySection(findSectionByPrefix(markdown, "## Day 2")),
    day3: parseBreakfastDaySection(findSectionByPrefix(markdown, "## Day 3")),
    day4: parseBreakfastDaySection(findSectionByPrefix(markdown, "## Day 4"))
  };
  // Top-level scene/news/lines mirror Day 1 so existing render paths keep working.
  return {
    scene: days.day1.scene,
    news: days.day1.news,
    lines: days.day1.lines,
    days
  };
}

function parseDiaryMarkdown(markdown) {
  const charMap = {
    chensiyuan: "## 陈思远",
    linzhe: "## 林哲",
    zhouwenhan: "## 周文涵"
  };
  const result = {};
  Object.entries(charMap).forEach(([npcId, headingPrefix]) => {
    const section = findSectionByPrefix(markdown, headingPrefix);
    const outcomeMap = {};
    const blocks = splitLevel3Sections(section);
    ["A", "B", "C"].forEach((key) => {
      const block = blocks.find((part) => part.trim().startsWith(`### ${key} `)) || "";
      const quoteMatch = block.match(/>\s*([\s\S]+?)(?=\n---|\n###|$)/);
      outcomeMap[key] = stripMd(quoteMatch ? quoteMatch[1] : "");
    });
    result[npcId] = outcomeMap;
  });
  return result;
}

function normalizeChoicePreview(raw) {
  return stripMd(raw)
    .replace(/^["“]/, "")
    .replace(/["”]$/, "")
    .trim();
}

function normalizeNpcReply(raw) {
  const text = stripMd(raw);
  if (!text) return "";
  const short = text.split("。").filter(Boolean).slice(0, 2).join("。");
  return short.endsWith("。") ? short : `${short}。`;
}

// Per-table key resolver. Each dialogue table is parsed against its own
// header row — Block 1 / 2 / 3 may phrase column headers differently
// (e.g. "AI 生成方向" vs "AI 生成方向（瑶珍的台词）", or "陈思远的反应"
// vs "林哲的反应" vs "结局"). Resolve by substring against every header
// in this specific table; warn (but don't throw) if a required column is
// missing so future drift is visible in console instead of silently
// rendering an empty body.
function resolveDialogueTableKeys(table, tableKind, contextLabel) {
  const headers = Object.keys(table[0] || {});
  const find = (matchers) => headers.find((header) => matchers.some((m) => header.includes(m))) || "";
  const labelKey = find(["态度"]);
  const previewKey = find(["AI", "瑶珍", "台词"]);
  const responseKey = tableKind === "final"
    ? find(["结局", "结果"])
    : find(["反应", "回应"]);
  const missing = [];
  if (!labelKey) missing.push("label(态度)");
  if (!previewKey) missing.push("preview(AI 生成方向)");
  if (!responseKey) missing.push(tableKind === "final" ? "result(结局)" : "response(反应)");
  if (missing.length && headers.length) {
    console.warn(
      `[parseDialogueMarkdown] ${contextLabel}: missing column(s) ${missing.join(", ")}; headers = ${JSON.stringify(headers)}`
    );
  }
  return { labelKey, previewKey, responseKey };
}

function parseDialogueMarkdown(markdown, npc) {
  const sections = splitLevel2Sections(markdown);
  const openingSection = sections[1] || "";
  const conflict1Section = sections[2] || "";
  const expand1Section = sections[3] || "";
  const conflict2Section = sections[4] || "";
  const expand2Section = sections[5] || "";
  const finalSection = sections[6] || "";
  const conflict1Table = parseMarkdownTable(conflict1Section);
  const conflict2Table = parseMarkdownTable(conflict2Section);
  const finalTable = parseMarkdownTable(finalSection);

  // Each table is parsed against its own header row. Earlier this function
  // resolved key names from `conflict1Table[0]` once and reused them for
  // `conflict2Table`, which silently lost the preview column whenever the
  // two tables phrased their headers differently (e.g. 陈思远 Block 1 uses
  // "AI 生成方向（瑶珍的台词）", Block 2 uses "AI 生成方向"). Resolve per
  // table — and warn on misses so future header drift is loud, not silent.
  const conflict1Keys = resolveDialogueTableKeys(conflict1Table, "reply", `${npc.id} Block 1`);
  const conflict2Keys = resolveDialogueTableKeys(conflict2Table, "reply", `${npc.id} Block 2`);
  const finalKeys = resolveDialogueTableKeys(finalTable, "final", `${npc.id} Block 3`);

  // "跳过寒暄" support. We don't add metadata to the markdown — the
  // existing section boundaries already encode where small talk ends and
  // the core interaction begins (Block 1: ## 开场 → smalltalk, ## 冲突节点① → core).
  // We tag each step with `phase` and pre-compute the first core index per
  // block so the UI can show / hide the skip button and jump in O(1).
  // Block 2/3 are entirely "core" by design — observation, reaction, and
  // final-judgment beats are never skippable.
  const tagPhase = (steps, phase) => steps.map((step) => ({ ...step, phase }));
  const block1Opening = tagPhase(parseSectionSequence(openingSection), "smalltalk");
  const block1Conflict = tagPhase(parseSectionSequence(conflict1Section), "core");
  const block1Steps = [...block1Opening, ...block1Conflict];
  const block2Steps = tagPhase(
    [...parseSectionSequence(expand1Section), ...parseSectionSequence(conflict2Section)],
    "core"
  );
  const block3Steps = tagPhase(
    [...parseSectionSequence(expand2Section), ...parseSectionSequence(finalSection)],
    "core"
  );

  return {
    file: npc.dialogueFile,
    // "跳过寒暄" 跳转目标 — 单一可配置入口。
    // 默认 = 第一个 block 的核心节点起点（Block 1 寒暄段之后的第一个 core step，
    // 通常正是 NPC 抛出冲突触发关键句的那一刻）。要为某个 NPC 单独覆盖，只需要
    // 在这一处计算逻辑里加 npc-specific 分支即可，UI 端不用动。
    coreInteractionEntry: {
      blockIndex: 0,
      stepIndex: block1Opening.length
    },
    blocks: [
      {
        sourceHeading: "Block 1",
        steps: block1Steps,
        coreStartIndex: block1Opening.length,
        responses: conflict1Table.map((row, index) => ({
          sourceType: "conflict-1",
          key: index === 0 ? "A" : index === 1 ? "B" : index === 2 ? "C" : `X${index + 1}`,
          label: row[conflict1Keys.labelKey],
          playerLine: normalizeChoicePreview(row[conflict1Keys.previewKey]),
          npcReply: normalizeNpcReply(row[conflict1Keys.responseKey]),
          tone: index === 0 ? "A" : "B"
        }))
      },
      {
        sourceHeading: "Block 2",
        steps: block2Steps,
        coreStartIndex: 0,
        responses: conflict2Table.map((row, index) => ({
          sourceType: "conflict-2",
          key: index === 0 ? "A" : index === 1 ? "B" : index === 2 ? "C" : `X${index + 1}`,
          label: row[conflict2Keys.labelKey],
          playerLine: normalizeChoicePreview(row[conflict2Keys.previewKey]),
          npcReply: normalizeNpcReply(row[conflict2Keys.responseKey]),
          tone: index === 0 ? "A" : "B"
        }))
      },
      {
        sourceHeading: "Block 3",
        steps: block3Steps,
        coreStartIndex: 0,
        responses: finalTable.map((row, index) => ({
          sourceType: "final",
          key: index === 0 ? "A" : index === 1 ? "B" : "C",
          label: row[finalKeys.labelKey],
          playerLine: normalizeChoicePreview(row[finalKeys.previewKey]),
          npcReply: normalizeNpcReply(row[finalKeys.responseKey]),
          tone: index === 0 ? "A" : index === 1 ? "B" : "C"
        }))
      }
    ]
  };
}

async function fetchSource(path) {
  if (SOURCE_CACHE.raw[path]) return SOURCE_CACHE.raw[path];
  const response = await fetch(path, { cache: "no-store" });
  if (!response.ok) {
    throw new Error(`Failed to load ${path}: ${response.status}`);
  }
  const text = await response.text();
  SOURCE_CACHE.raw[path] = text;
  debugLog(`Loaded file ${path}`);
  return text;
}

async function ensureBreakfastData() {
  if (SOURCE_CACHE.parsed.breakfast) return SOURCE_CACHE.parsed.breakfast;
  if (SOURCE_CACHE.pending.breakfast) return SOURCE_CACHE.pending.breakfast;
  SOURCE_CACHE.error = null;
  SOURCE_CACHE.pending.breakfast = (async () => {
    const markdown = await fetchSource(SOURCE_MANIFEST.breakfast);
    const parsed = parseBreakfastMarkdown(markdown);
    SOURCE_CACHE.parsed.breakfast = parsed;
    return parsed;
  })().catch((error) => {
    SOURCE_CACHE.error = error;
    debugLog("Loader error", error);
    throw error;
  }).finally(() => {
    SOURCE_CACHE.pending.breakfast = null;
    updateSourceLoadingState();
  });
  updateSourceLoadingState();
  return SOURCE_CACHE.pending.breakfast;
}

async function ensureDiaryData() {
  if (SOURCE_CACHE.parsed.diary) return SOURCE_CACHE.parsed.diary;
  if (SOURCE_CACHE.pending.diary) return SOURCE_CACHE.pending.diary;
  SOURCE_CACHE.error = null;
  SOURCE_CACHE.pending.diary = (async () => {
    const markdown = await fetchSource(SOURCE_MANIFEST.diary);
    const parsed = parseDiaryMarkdown(markdown);
    SOURCE_CACHE.parsed.diary = parsed;
    return parsed;
  })().catch((error) => {
    SOURCE_CACHE.error = error;
    debugLog("Loader error", error);
    throw error;
  }).finally(() => {
    SOURCE_CACHE.pending.diary = null;
    updateSourceLoadingState();
  });
  updateSourceLoadingState();
  return SOURCE_CACHE.pending.diary;
}

async function ensureDialogueData(npcId) {
  if (!npcId) return null;
  if (SOURCE_CACHE.parsed.dialogues[npcId]) return SOURCE_CACHE.parsed.dialogues[npcId];
  if (SOURCE_CACHE.pending.dialogues[npcId]) return SOURCE_CACHE.pending.dialogues[npcId];
  const npc = getNpc(npcId);
  if (!npc) return null;
  SOURCE_CACHE.error = null;
  SOURCE_CACHE.pending.dialogues[npcId] = (async () => {
    const markdown = await fetchSource(npc.dialogueFile);
    const parsed = parseDialogueMarkdown(markdown, npc);
    SOURCE_CACHE.parsed.dialogues[npcId] = parsed;
    return parsed;
  })().catch((error) => {
    SOURCE_CACHE.error = error;
    debugLog("Loader error", error);
    throw error;
  }).finally(() => {
    SOURCE_CACHE.pending.dialogues[npcId] = null;
    updateSourceLoadingState();
  });
  updateSourceLoadingState();
  return SOURCE_CACHE.pending.dialogues[npcId];
}

async function ensureDataForScreen(screen = STATE.screen) {
  if (screen === "breakfast") return ensureBreakfastData();
  if (screen === "dialogue") return ensureDialogueData(STATE.selectedNpcId);
  if (screen === "diary") {
    return Promise.all([
      ensureBreakfastData(),
      ensureDiaryData()
    ]);
  }
  return null;
}

function isScreenDataReady(screen = STATE.screen) {
  if (screen === "breakfast") return Boolean(SOURCE_CACHE.parsed.breakfast);
  if (screen === "dialogue") return Boolean(STATE.selectedNpcId && SOURCE_CACHE.parsed.dialogues[STATE.selectedNpcId]);
  if (screen === "diary") return Boolean(SOURCE_CACHE.parsed.breakfast && SOURCE_CACHE.parsed.diary);

function logCurrentBlock(npc, block) {

  STATE.debugLastBlockTag = tag;
  console.log(`Loaded:\n${npc.dialogueFile}\n↓\n${npc.name}\n↓\n${block.sourceHeading || `Block${STATE.blockIndex + 1}`}`);
}

function lastDialogueStep(steps, endIndex) {
  for (let index = endIndex; index >= 0; index -= 1) {
    const step = steps[index];
    if (step && step.kind === "dialogue") return step;
  }
  return null;
}

function renderDialogueOverlay(npc, dialogue, block) {
  if (!dialogue || !block) {
    return {
      narrationMarkup: "",
      controlsMarkup: `<button class="btn primary" data-action="back-selection">返回选择</button>`,
      responseMarkup: "",
      trayMarkup: `
        <div class="dialogue-speaker">Runtime Error</div>
        <p class="tray-text fade-in">当前对白 Block 读取失败，请返回对象选择后重试。</p>
      `
    };
  }
  const currentStep = currentDialogueStep();
  const response = STATE.selectedResponseIndex === null ? null : block.responses[STATE.selectedResponseIndex];
  const lastSpoken = lastDialogueStep(block.steps || [], STATE.dialogueStepIndex);
  logCurrentBlock(npc, block);

  let narrationMarkup = "";
  let controlsMarkup = "";
  let responseMarkup = "";
  let trayMarkup = "";

  if (STATE.dialoguePhase === "sequence" && currentStep) {
    if (currentStep.kind === "narration") {
      const emphasisLabel = currentStep.emphasis === "trigger" ? "内心" : "观察";
      narrationMarkup = `
        <div class="narration-label">${emphasisLabel}</div>
        <p class="narration-text fade-in">${escapeHtml(currentStep.text)}</p>
      `;
      controlsMarkup = "";
    } else if (currentStep.kind === "dialogue") {
      controlsMarkup = `
        <span class="status-chip">第 ${STATE.dialogueStepIndex + 1} / ${block.steps.length} 段</span>
        <button class="btn primary" data-action="continue-dialogue">继续</button>
      `;
      trayMarkup = `
        <div class="dialogue-speaker">${escapeHtml(currentStep.speaker)}</div>
        <p class="tray-text fade-in">${escapeHtml(currentStep.text)}</p>
      `;
    }
  } else if (STATE.dialoguePhase === "response") {
    controlsMarkup = lastSpoken ? `<span class="status-chip">请选择你的回应</span>` : "";
    responseMarkup = block.responses.map((item, index) => `
      <button class="btn response-btn" data-action="choose-response" data-response-index="${index}">
        <strong>${escapeHtml(item.label)}</strong>
        <span>${escapeHtml(item.playerLine)}</span>
      </button>
    `).join("");
    if (lastSpoken) {
      trayMarkup = `
        <div class="dialogue-speaker">${escapeHtml(lastSpoken.speaker)}</div>
        <p class="tray-text">${escapeHtml(lastSpoken.text)}</p>
      `;
    }
  } else if (STATE.dialoguePhase === "reaction" && response) {
    trayMarkup = `
      <div class="dialogue-speaker">瑶珍</div>
      <p class="tray-text fade-in" style="color:#ead4b0;">${escapeHtml(response.playerLine)}</p>
      <div class="dialogue-speaker" style="margin-top:12px;">${escapeHtml(npc.name)}</div>
      <p class="tray-text fade-in">${escapeHtml(response.npcReply)}</p>
    `;
    controlsMarkup = `
      <span class="status-chip">回应完成</span>
      <button class="btn primary" data-action="next-block">${STATE.blockIndex < dialogue.blocks.length - 1 ? "进入下一段" : "写日记"}</button>
    `;
  }

  return {
    narrationMarkup,
    controlsMarkup,
    responseMarkup,
    trayMarkup
  };
}

function patchDialogueScreen() {
  const narrationShell = document.getElementById("dialogue-narration-shell");
  const narrationContent = document.getElementById("dialogue-narration-content");
  const controlsShell = document.getElementById("dialogue-controls-shell");
  const controlsContent = document.getElementById("dialogue-controls-content");
  const responseShell = document.getElementById("dialogue-response-shell");
  const responseContent = document.getElementById("dialogue-response-content");
  const trayShell = document.getElementById("dialogue-tray-shell");
  const trayContent = document.getElementById("dialogue-tray-content");
  const stage = document.querySelector("[data-dialogue-stage='true']");
  if (!narrationShell || !narrationContent || !controlsShell || !controlsContent || !responseShell || !responseContent || !trayShell || !trayContent || !stage) return false;
  const npc = getNpc(STATE.selectedNpcId);
  const currentSceneKey = stage.closest(".screen")?.dataset.sceneKey;
  if (!npc || currentSceneKey !== npc.id) return false;
  const dialogue = currentDialogue();
  const block = currentBlock();
  const audioChip = typeof stage.querySelector === "function"
    ? stage.querySelector("[data-audio-chip='true']")
    : null;
  const overlay = renderDialogueOverlay(npc, dialogue, block);
  if (audioChip) {
    audioChip.textContent = AUDIO_STATE.playing ? `⏸ 暂停${currentAudioConfigForState()?.kind === "news" ? "新闻" : "BGM"}` : `🔊 继续${currentAudioConfigForState()?.kind === "news" ? "新闻" : "BGM"}`;
  }
  narrationContent.innerHTML = overlay.narrationMarkup;
  controlsContent.innerHTML = overlay.controlsMarkup;
  responseContent.innerHTML = overlay.responseMarkup;
  trayContent.innerHTML = overlay.trayMarkup;
  narrationShell.hidden = !overlay.narrationMarkup;
  controlsShell.hidden = !overlay.controlsMarkup;
  responseShell.hidden = !overlay.responseMarkup;
  trayShell.hidden = !overlay.trayMarkup;
  // "跳过寒暄" (Round 10 redesign): visible across the entire conversation in
  // sequence phase, hidden during response/reaction (player decision + NPC
  // reaction are the moments the spec explicitly forbids skipping). Also
  // hidden when there's literally nothing left to skip in the current block
  // (last step + already going to response next click).
  const skipBtn = document.getElementById("dialogue-skip-smalltalk-btn");
  if (skipBtn) {
    const stepsLen = block && Array.isArray(block.steps) ? block.steps.length : 0;
    const inSequence = STATE.dialoguePhase === "sequence";
    const hasMoreToSkip = stepsLen > 0 && STATE.dialogueStepIndex < stepsLen - 1;
    const dialogueObj = currentDialogue();
    const coreEntry = dialogueObj?.coreInteractionEntry;
    const beforeCore = coreEntry && (
      STATE.blockIndex < coreEntry.blockIndex ||
      (STATE.blockIndex === coreEntry.blockIndex && STATE.dialogueStepIndex < coreEntry.stepIndex)
    );
    // Show whenever the player is in sequence AND either has more steps in
    // this block to fast-forward through, or is before the configured core
    // entry (cross-block jump).
    const showSkip = inSequence && (hasMoreToSkip || beforeCore);
    skipBtn.hidden = !showSkip;
  }
  return true;
}
